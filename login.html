<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ทะเบียนหนังสือ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f6f9;
        }
        .background-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; z-index: -2;
        }
        .gradient-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(241, 221, 193, 0.8) 100%);
            z-index: -1;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 400px;
        }
        .btn-login {
            background-color: #38bdf8; color: white; border-radius: 50px;
            padding: 10px; font-weight: bold; font-size: 1.2rem; width: 100%;
            transition: all 0.3s;
        }
        .btn-login:hover { background-color: #0284c7; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="background-overlay"></div>
    <div class="gradient-overlay"></div>

    <div class="login-card">
        <h2 class="text-center fw-bold mb-4">เข้าสู่ระบบ</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-semibold">อีเมลผู้ใช้งาน</label>
                <input type="email" class="form-control" id="email" required placeholder="admin@admin.com">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">รหัสผ่าน</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-login" id="submitBtn">เข้าสู่ระบบ</button>
            <div class="text-center mt-3">
                <a href="index.html" class="text-secondary text-decoration-none">&laquo; กลับหน้าแรก</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://rfvageoqxgrncdaborht.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmdmFnZW9xeGdybmNkYWJvcmh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTI0OTgsImV4cCI6MjA5MTI4ODQ5OH0.Wf6cpX1jhK2nuhpHON101wUonr1kZDf6uh7IDVE-DmQ';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.innerHTML = 'กำลังตรวจสอบ...'; 
    btn.disabled = true;

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // ลอง Login
    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password,
    });

    if (error) {
        // ถ้าพลาด ให้บอกเหตุผลจากระบบเลยว่าพลาดเพราะอะไร
        console.error('Login Error:', error.message);
        alert('เข้าสู่ระบบไม่สำเร็จ: ' + error.message); 
        btn.innerHTML = 'เข้าสู่ระบบ'; 
        btn.disabled = false;
    } else {
        console.log('Login Success:', data);
        alert('ยินดีด้วย! เข้าสู่ระบบสำเร็จ');
        window.location.href = 'index.html'; 
    }
});

        
    </script>
</body>
</html>
