<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนรับ-ส่งหนังสือ | ศูนย์คอมพิวเตอร์สำนักงานอธิการบดี</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ส่วนพื้นที่หลังพร้อมเอฟเฟกต์ไล่ระดับสี */
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* ใช้รูปภาพพื้นหลังจำลอง (คุณสามารถเปลี่ยนเป็นรูปจริงได้) */
            background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -2;
        }

        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* เอฟเฟกต์ไล่ระดับสีทอง/ทองแดงแบบในรูป */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(241, 221, 193, 0.7) 100%);
            z-index: -1;
        }

        /* ปรับแต่งส่วนหัว (Header) */
        header {
            padding-top: 2rem;
            z-index: 10;
        }

        .logo-container img {
            max-height: 50px; /* ปรับขนาดโลโก้ตามต้องการ */
            width: auto;
        }

        .header-text {
            color: #4a3e2e; /* สีน้ำตาลเข้ม/ทองแดงสำหรับข้อความหัวข้อ */
            font-weight: 600;
        }

        /* ส่วนเนื้อหาหลัก */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
            padding-bottom: 5rem;
        }

        /* ขอบขาวและเงาของตัวหนังสือหัวข้อหลัก */
        .system-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem); 
            font-weight: 700;
            color: #000;
            margin-bottom: 4rem;
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff,
                 0px  8px 20px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }

        /* ปรับแต่งปุ่มเพิ่มเติม */
        .btn-custom {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 600;
            border-radius: 12px;
            color: white !important; /* ค่าเริ่มต้นตัวหนังสือสีขาว */
            border: 3px solid transparent;
            box-shadow: 6px 8px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease; 
        }

        /* เอฟเฟกต์ตอนเอาเมาส์ชี้ (ดันปุ่มขึ้น, เพิ่มเงา, พื้นหลังเป็นสีขาว) */
        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 6px 10px 20px rgba(0, 0, 0, 0.6);
            background-color: #ffffff !important; 
        }

        /* ปุ่มสีฟ้า (หนังสือรับเข้า) */
        .btn-sky-blue { 
            background-color: #38bdf8; 
        }
        .btn-sky-blue:hover {
            color: #38bdf8 !important; /* ตัวหนังสือสีฟ้าเมื่อโฮเวอร์ */
            border-color: #38bdf8 !important;
        }

        /* ปุ่มสีแดง (หนังสือส่งออก) */
        .btn-coral-red { 
            background-color: #fb7185; 
        }
        .btn-coral-red:hover {
            color: #fb7185 !important; /* ตัวหนังสือสีแดงเมื่อโฮเวอร์ */
            border-color: #fb7185 !important;
        }

        /* ปรับแต่งสำหรับการแสดงผลบนมือถือ */
        @media (max-width: 576px) {
            .logo-container img {
                max-height: 40px;
            }
            .header-text {
                font-size: 0.9rem;
            }
            .system-title {
                margin-bottom: 3rem;
            }
            .btn-custom {
                padding: 1rem 1.5rem;
                width: 100%;
            }
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <div class="background-overlay"></div>
    <div class="gradient-overlay"></div>
    <div id="menu-container"></div>
    <header class="container-fluid">
        <div class="d-flex flex-column flex-sm-row justify-content-center align-items-center gap-2 gap-sm-4 px-3">
            <div class="logo-container">
                <img src="photo/logoNew.png" alt="โลโก้ศูนย์คอมพิวเตอร์">
            </div>
            <div class="header-text fs-5 text-center text-sm-start">
                ศูนย์คอมพิวเตอร์สำนักงานอธิการบดี
            </div>
        </div>
    </header>

    <main class="main-content container px-3">
        
        <h1 class="system-title fw-bold text-dark">
            ระบบลงทะเบียนรับ-ส่งหนังสือ
        </h1>
        
        <div class="d-grid gap-4 d-sm-flex justify-content-sm-center">
            <a href="Doc_In.html" class="btn btn-custom btn-sky-blue px-5 py-3">หนังสือรับเข้า</a>
            <a href="#" class="btn btn-custom btn-coral-red px-5 py-3">หนังสือส่งออก</a>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bundle.min.js"></script>
</body>
</html>
