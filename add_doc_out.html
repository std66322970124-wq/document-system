<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทะเบียนส่งออกหนังสือ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            /* ใส่สีพื้นหลังหรือรูปภาพให้คล้ายต้นฉบับ */
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }
        .header-title {
            text-align: center;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #2c3e50;
        }
        /* แต่งช่อง Input ให้กลมและสีคล้ายต้นแบบ */
        .form-control, .form-select {
            border-radius: 50px;
            background-color: #f1f3f5;
            border: 1px solid #ced4da;
            padding: 10px 20px;
        }
        .form-label {
            font-weight: 600;
            margin-top: 8px;
        }
        .btn-save {
            background-color: #8BC34A; /* สีเขียว */
            color: white;
            border-radius: 50px;
            padding: 12px 40px;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .btn-save:hover { background-color: #7CB342; transform: translateY(-2px); }
        
        .btn-back {
            background-color: #FF5252; /* สีแดง */
            color: white;
            border-radius: 50px;
            padding: 12px 40px;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .btn-back:hover { background-color: #E53935; color: white; transform: translateY(-2px); }


                /* CSS สำหรับเมนูด้านบน */
        body { padding-top: 80px; }
        @media all and (min-width: 992px) {
            .navbar .dropdown-menu { display: none; border-radius: 10px; margin-top: 0; }
            .navbar .nav-item:hover .dropdown-menu { display: block; animation: fadeUp 0.3s forwards; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div id="menu-container"></div>
<div class="container">
    <div class="form-container mx-auto">
        <h2 class="header-title">ทะเบียนส่งออกหนังสือ</h2>
        
        <form id="docOutForm">
            <div class="row mb-3 align-items-center">
                <div class="col-md-4 text-md-end">
                    <label class="form-label">วันเดือนปีที่ส่งหนังสือ</label>
                </div>
                <div class="col-md-7">
                    <input type="date" class="form-control" id="date" required>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <div class="col-md-4 text-md-end">
                    <label class="form-label">เลขที่บันทึกข้อความ</label>
                </div>
                <div class="col-md-7">
                    <input type="text" class="form-control" id="numDoc" required>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <div class="col-md-4 text-md-end">
                    <label class="form-label">พ.ศ.</label>
                </div>
                <div class="col-md-7">
                    <input type="text" class="form-control" id="year" required>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <div class="col-md-4 text-md-end">
                    <label class="form-label">เรื่อง</label>
                </div>
                <div class="col-md-7">
                    <input type="text" class="form-control" id="title" required>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <div class="col-md-4 text-md-end">
                    <label class="form-label">ถึงหน่วยงาน</label>
                </div>
                <div class="col-md-4">
                    <select class="form-select" id="to_id" required>
                        <option value="">-- เลือกหน่วยงาน --</option>
                    </select>
                </div>
                <div class="col-md-1 text-md-end p-0">
                    <label class="form-label">หมายเหตุ</label>
                </div>
                <div class="col-md-2">
                    <input type="text" class="form-control" id="remark">
                </div>
            </div>

            <div class="row mb-4 align-items-center">
                <div class="col-md-4 text-md-end">
                    <label class="form-label">ผู้ทำบันทึก</label>
                </div>
                <div class="col-md-7">
                    <select class="form-select" id="per_id" required>
                        <option value="">-- เลือกผู้ทำบันทึก --</option>
                    </select>
                </div>
            </div>

            <div class="text-center mt-5">
                <button type="submit" class="btn btn-save me-3">บันทึก</button>
                <a href="index.html" class="btn btn-back">กลับหน้าแรก</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseUrl = 'https://rfvageoqxgrncdaborht.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmdmFnZW9xeGdybmNkYWJvcmh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTI0OTgsImV4cCI6MjA5MTI4ODQ5OH0.Wf6cpX1jhK2nuhpHON101wUonr1kZDf6uh7IDVE-DmQ';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // ดึงข้อมูลหน่วยงาน (จากตาราง From) และบุคลากร (จากตาราง Person) มาใส่ Dropdown
    async function loadDropdowns() {
        const [fromRes, personRes] = await Promise.all([
            supabaseClient.from('From').select('*'), // ใช้ตารางเดียวกับ doc_in
            supabaseClient.from('Person').select('*')
        ]);

        if (fromRes.data) {
            const toSelect = document.getElementById('to_id');
            fromRes.data.forEach(dept => {
                toSelect.innerHTML += `<option value="${dept.From_ID}">${dept.From_Name}</option>`;
            });
        }

        if (personRes.data) {
            const perSelect = document.getElementById('per_id');
            personRes.data.forEach(person => {
                perSelect.innerHTML += `<option value="${person.Per_ID}">${person.Name}</option>`;
            });
        }
    }

    // จัดการเมื่อกดปุ่มบันทึก
    document.getElementById('docOutForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // ป้องกันหน้าเว็บรีเฟรช

        // เช็กสิทธิ์ก่อนบันทึก (เผื่อไม่ได้ล็อกอิน)
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) {
            alert('กรุณาเข้าสู่ระบบก่อนทำการบันทึกข้อมูล');
            return;
        }

        // เก็บค่าจากฟอร์ม
        const payload = {
            Date: document.getElementById('date').value,
            NumDoc: document.getElementById('numDoc').value,
            Year: document.getElementById('year').value,
            Title: document.getElementById('title').value,
            To_ID: document.getElementById('to_id').value,
            Remark: document.getElementById('remark').value,
            Per_ID: document.getElementById('per_id').value
        };

        // บันทึกลง Supabase
        const { data, error } = await supabaseClient
            .from('Doc_Comeout')
            .insert([payload]);

        if (error) {
            alert('เกิดข้อผิดพลาดในการบันทึก: ' + error.message);
            console.error(error);
        } else {
            alert('✅ บันทึกข้อมูลส่งออกหนังสือสำเร็จ!');
            document.getElementById('docOutForm').reset(); // ล้างฟอร์ม
        }
    });

    // เริ่มทำงานเมื่อเปิดหน้า
    loadDropdowns();
</script>
    <script src="menu.js"></script>

</body>
</html>
