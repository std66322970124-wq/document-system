<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการทะเบียนส่งหนังสือ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png'), linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            background-color: #cfdef3;
            background-attachment: fixed;
            background-size: cover;
            padding-top: 60px;
        }
        .header-title {
            text-align: center;
            font-weight: bold;
            margin-top: 1rem;
            margin-bottom: 2rem;
            color: #000;
        }
        .search-container {
            background-color: rgba(240, 242, 245, 0.85);
            border-radius: 50px;
            padding: 10px 30px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap; /* เผื่อหน้าจอมือถือปุ่มจะได้ปัดลงมา */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
        }
        .search-container span {
            font-weight: 600;
            white-space: nowrap;
        }
        .search-container input, .search-container select {
            border-radius: 30px;
            border: 1px solid #ccc;
            padding: 8px 20px;
            outline: none;
            flex: 1;
            max-width: 200px;
        }
        .btn-search {
            background-color: #6c757d;
            color: white;
            border-radius: 30px;
            padding: 8px 25px;
            font-weight: bold;
            border: none;
        }
        .btn-search:hover { background-color: #5a6268; }
        
        .btn-clear {
            background-color: #e0e0e0;
            color: #333;
            border-radius: 30px;
            padding: 8px 25px;
            font-weight: bold;
            border: none;
        }
        .btn-clear:hover { background-color: #d6d6d6; }

        /* ปุ่ม Export Excel */
        .btn-excel {
            background-color: #107c41; /* สีเขียวสไตล์ Excel */
            color: white;
            border-radius: 30px;
            padding: 8px 25px;
            font-weight: bold;
            border: none;
            transition: all 0.3s;
        }
        .btn-excel:hover {
            background-color: #0b5e31;
            color: white;
        }

        .table-custom {
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid #444;
            margin-bottom: 0;
        }
        .table-custom thead th {
            background-color: #f48a3d;
            color: black;
            text-align: center;
            vertical-align: middle;
            border: 1px solid #444;
            padding: 15px;
            font-size: 0.95rem;
        }
        .table-custom tbody td {
            text-align: center;
            vertical-align: middle;
            border: 1px solid #444;
            padding: 12px;
            font-size: 0.9rem;
        }
        .btn-back {
            background-color: #38bdf8;
            color: white;
            font-weight: bold;
            border-radius: 30px;
            padding: 10px 40px;
            margin-top: 20px;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-back:hover { background-color: #0284c7; color: white; }
    </style>
</head>
<body>
<div id="menu-container"></div>
<div class="container-fluid px-4 mb-5">
    <h4 class="header-title">ทะเบียนส่งหนังสือ ประจำปี 2569 ศูนย์คอมพิวเตอร์ สำนักงานอธิการบดี มหาวิทยาลัยราชภัฏอุบลราชธานี</h4>

    <form id="searchForm">
        <div class="search-container mx-auto">
            <span>ค้นหาหนังสือ</span>
            <input type="text" id="search_num" placeholder="เลขที่หนังสือ">
            <input type="text" id="search_title" placeholder="เรื่อง">
            <select id="search_to">
                <option value="">-- หน่วยงาน --</option>
            </select>
            <button type="submit" class="btn-search">ค้นหา</button>
            <button type="button" class="btn-clear" onclick="resetSearch()">ล้างค่า</button>
            <button type="button" class="btn-excel" onclick="exportToExcel()">📥 ส่งออก Excel</button>
        </div>
    </form>

    <div class="table-responsive shadow">
        <table class="table table-custom table-hover">
            <thead>
                <tr>
                    <th style="width: 5%;">ลำดับที่</th>
                    <th style="width: 15%;">วันเดือนปีที่ส่งหนังสือ</th>
                    <th style="width: 15%;">เลขที่บันทึกข้อความ</th>
                    <th style="width: 5%;">พ.ศ.</th>
                    <th style="width: 25%;">เรื่อง</th>
                    <th style="width: 15%;">ถึงหน่วยงาน</th>
                    <th style="width: 15%;">ผู้ทำบันทึก</th>
                    <th id="manageHeader" style="width: 5%; display: none;">จัดการ</th> 
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

<div class="text-end mb-4">
        <a href="index.html" class="btn btn-back" id="btnBackToHome" style="display: none;">กลับหน้าแรก</a>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-warning">
        <h5 class="modal-title fw-bold">✏️ แก้ไขข้อมูลหนังสือส่งออก</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editForm">
          <input type="hidden" id="edit_id"> 
          
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">เลขที่บันทึกข้อความ</label>
              <input type="text" class="form-control rounded-pill" id="edit_numdoc">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">พ.ศ.</label>
              <input type="number" class="form-control rounded-pill" id="edit_year">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">เรื่อง</label>
            <input type="text" class="form-control rounded-pill" id="edit_title">
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">วันเดือนปีที่ส่งหนังสือ</label>
              <input type="date" class="form-control rounded-pill" id="edit_date">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">ถึงหน่วยงาน</label>
              <select class="form-control rounded-pill" id="edit_to"></select>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">ผู้ทำบันทึก</label>
              <select class="form-control rounded-pill" id="edit_per"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">หมายเหตุ</label>
              <input type="text" class="form-control rounded-pill" id="edit_remark">
            </div>
          </div>

        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="button" class="btn btn-success rounded-pill" onclick="saveEdit()">💾 บันทึกการแก้ไข</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseUrl = 'https://rfvageoqxgrncdaborht.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmdmFnZW9xeGdybmNkYWJvcmh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTI0OTgsImV4cCI6MjA5MTI4ODQ5OH0.Wf6cpX1jhK2nuhpHON101wUonr1kZDf6uh7IDVE-DmQ';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    let currentData = []; 
    let editModal; 
    let isLoggedIn = false; 

// เช็กสถานะการล็อกอิน
    async function checkAuth() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        isLoggedIn = !!session; 
        
        // ซ่อน/โชว์ คอลัมน์จัดการ
        const manageHeader = document.getElementById('manageHeader');
        if (manageHeader) {
            manageHeader.style.display = isLoggedIn ? '' : 'none';
        }

        // --- เพิ่มโค้ดตรงนี้: ซ่อน/โชว์ ปุ่มกลับหน้าแรก ---
        const btnBackToHome = document.getElementById('btnBackToHome');
        if (btnBackToHome) {
            btnBackToHome.style.display = isLoggedIn ? '' : 'none';
        }
    }

    async function loadDropdowns() {
        const [fromRes, personRes] = await Promise.all([
            supabaseClient.from('From').select('*'),
            supabaseClient.from('Person').select('*')
        ]);

        const searchTo = document.getElementById('search_to');
        const editTo = document.getElementById('edit_to');
        const editPer = document.getElementById('edit_per');

        if(fromRes.data) {
            editTo.innerHTML = '<option value="">-- เลือกหน่วยงาน --</option>';
            fromRes.data.forEach(f => {
                searchTo.innerHTML += `<option value="${f.From_ID}">${f.From_Name}</option>`;
                editTo.innerHTML += `<option value="${f.From_ID}">${f.From_Name}</option>`;
            });
        }

        if(personRes.data) {
            editPer.innerHTML = '<option value="">-- เลือกผู้ทำบันทึก --</option>';
            personRes.data.forEach(p => {
                editPer.innerHTML += `<option value="${p.Per_ID}">${p.Name}</option>`;
            });
        }
    }

    async function loadData(searchNum = '', searchTitle = '', searchTo = '') {
        await checkAuth();

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '<tr><td colspan="8">กำลังโหลดข้อมูล...</td></tr>';

        let query = supabaseClient
            .from('Doc_Comeout')
            .select(`
                *,
                From(From_Name),
                Person(Name)
            `);

        if (searchNum) query = query.ilike('NumDoc', `%${searchNum}%`);
        if (searchTitle) query = query.ilike('Title', `%${searchTitle}%`);
        if (searchTo) query = query.eq('To_ID', searchTo);

        const { data, error } = await query.order('ID_Docout', { ascending: true });

        if (error) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-danger">เกิดข้อผิดพลาด: ${error.message}</td></tr>`;
            return;
        }

        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-danger fw-bold py-4">ไม่พบข้อมูลหนังสือส่งออก</td></tr>';
            currentData = []; // เคลียร์ค่าหากไม่พบข้อมูล
            return;
        }

        currentData = data;
        tbody.innerHTML = ''; 
        
        data.forEach((row, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td>${row.Date ? new Date(row.Date).toLocaleDateString('th-TH') : '-'}</td>
                <td>${row.NumDoc || '-'}</td>
                <td>${row.Year || '-'}</td>
                <td>${row.Title || '-'}</td>
                <td>${row.From ? row.From.From_Name : '-'}</td> 
                <td class="text-primary fw-bold">${row.Person ? row.Person.Name : '-'}</td> 
                <td style="display: ${isLoggedIn ? '' : 'none'}">
                    <div class="d-flex gap-1 justify-content-center">
                        <button class="btn btn-warning btn-sm text-dark fw-bold rounded-pill px-3" onclick="openEditModal(${row.ID_Docout})">แก้ไข</button>
                        <button class="btn btn-danger btn-sm fw-bold rounded-pill px-3" onclick="deleteDoc(${row.ID_Docout})">ลบ</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ============================================
    // ฟังก์ชันใหม่: ส่งออกข้อมูลเป็นไฟล์ Excel
    // ============================================
    function exportToExcel() {
        if (!currentData || currentData.length === 0) {
            alert('ไม่มีข้อมูลสำหรับส่งออก กรุณาค้นหาข้อมูลก่อนครับ');
            return;
        }

        // 1. จัดเตรียมข้อมูล (ดึงมาเฉพาะคอลัมน์ที่ต้องการโชว์ใน Excel)
        const excelData = currentData.map((row, index) => {
            return {
                'ลำดับที่': index + 1,
                'วันเดือนปีที่ส่งหนังสือ': row.Date ? new Date(row.Date).toLocaleDateString('th-TH') : '-',
                'เลขที่บันทึกข้อความ': row.NumDoc || '-',
                'พ.ศ.': row.Year || '-',
                'เรื่อง': row.Title || '-',
                'ถึงหน่วยงาน': row.From ? row.From.From_Name : '-',
                'ผู้ทำบันทึก': row.Person ? row.Person.Name : '-',
                'หมายเหตุ': row.Remark || '-'
            };
        });

        // 2. แปลงข้อมูล JSON เป็น Worksheet ของ Excel
        const worksheet = XLSX.utils.json_to_sheet(excelData);

        // 3. สร้าง Workbook เปล่าๆ แล้วจับ Worksheet ยัดเข้าไป
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "ข้อมูลหนังสือส่งออก");

        // 4. สั่งดาวน์โหลดไฟล์
        XLSX.writeFile(workbook, 'ทะเบียนส่งออกหนังสือ.xlsx');
    }

    function openEditModal(id) {
        const row = currentData.find(r => r.ID_Docout === id);
        if(!row) return;

        document.getElementById('edit_id').value = row.ID_Docout;
        document.getElementById('edit_numdoc').value = row.NumDoc || '';
        document.getElementById('edit_year').value = row.Year || '';
        document.getElementById('edit_title').value = row.Title || '';
        document.getElementById('edit_date').value = row.Date || '';
        document.getElementById('edit_to').value = row.To_ID || '';
        document.getElementById('edit_per').value = row.Per_ID || '';
        document.getElementById('edit_remark').value = row.Remark || '';

        if(!editModal) editModal = new bootstrap.Modal(document.getElementById('editModal'));
        editModal.show();
    }

    async function saveEdit() {
        const id = document.getElementById('edit_id').value;
        const payload = {
            NumDoc: document.getElementById('edit_numdoc').value,
            Year: document.getElementById('edit_year').value,
            Title: document.getElementById('edit_title').value,
            Date: document.getElementById('edit_date').value || null,
            To_ID: document.getElementById('edit_to').value || null,
            Per_ID: document.getElementById('edit_per').value || null,
            Remark: document.getElementById('edit_remark').value
        };

        const { error } = await supabaseClient
            .from('Doc_Comeout')
            .update(payload)
            .eq('ID_Docout', id);

        if (error) {
            alert('เกิดข้อผิดพลาด: ' + error.message);
        } else {
            alert('✅ บันทึกข้อมูลสำเร็จ!');
            editModal.hide(); 
            loadData(
                document.getElementById('search_num').value, 
                document.getElementById('search_title').value, 
                document.getElementById('search_to').value
            );
        }
    }

    async function deleteDoc(id) {
        if(confirm('🚨 คุณต้องการลบหนังสือส่งออกฉบับนี้ใช่หรือไม่?')) {
            try {
                const { error } = await supabaseClient.from('Doc_Comeout').delete().eq('ID_Docout', id);
                if (error) throw error;
                alert('🗑️ ลบข้อมูลสำเร็จ!');
                
                loadData(
                    document.getElementById('search_num').value, 
                    document.getElementById('search_title').value, 
                    document.getElementById('search_to').value
                );
            } catch (err) {
                alert('ไม่สามารถลบได้: ' + (err.message || 'โปรดตรวจสอบสิทธิ์ RLS'));
            }
        }
    }

    document.getElementById('searchForm').addEventListener('submit', function(e) {
        e.preventDefault(); 
        const sNum = document.getElementById('search_num').value;
        const sTitle = document.getElementById('search_title').value;
        const sTo = document.getElementById('search_to').value;
        loadData(sNum, sTitle, sTo);
    });

    function resetSearch() {
        document.getElementById('search_num').value = '';
        document.getElementById('search_title').value = '';
        document.getElementById('search_to').value = '';
        loadData(); 
    }

    async function init() {
        await checkAuth(); 
        await loadDropdowns(); 
        await loadData();
    }

    init();
</script>
<script src="menu.js"></script>
</body>
</html>
